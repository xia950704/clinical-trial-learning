# 基因检测规则配置文件
# Genetic Testing Rules
#
# 本文件定义了基因检测数据检查的阈值参数。
# 这些规则由 genetic_checker.py 和 test_genetic.py 加载使用。

# ── 等位基因频率范围 ────────────────────────────────────────
allele_frequency:
  min: 0.0
  max: 1.0
  # 罕见变异阈值（低于此值标记为罕见）
  rare_threshold: 0.01
  # 常见变异阈值（高于此值标记为常见）
  common_threshold: 0.05

# ── 基因型格式规则 ────────────────────────────────────────
genotype_format:
  # 允许的基因型格式
  allowed_formats:
    - "AA"          # 纯合子 (如 AA, GG, TT)
    - "A/G"         # 杂合子 (如 A/G, C/T)
    - "1/*4"        # 星号命名法 (如 1/*4, *2/*2)
    - "*4/*4"       # 双星号命名法
    - "1/*2"
  # 星号命名法正则
  star_pattern: "^\\*?[0-9]+(/\\*?[0-9]+)?$"
  # 二倍体命名法正则
  diploid_pattern: "^[A-Z]/[A-Z]$"
  # 纯合子命名法正则
  homozygous_pattern: "^[A-Z]{2}$"

# ── 基因-药物关联映射 ────────────────────────────────────────
gene_drug_associations:
  CYP2D6:
    drugs:
      - "美托洛尔"
      - "氟西汀"
      - "帕罗西汀"
      - "文拉法辛"
      - "可待因"
    metabolism_phenotypes:
      poor: ["*4/*4", "*5/*5", "*3/*3", "*4/*5"]
      intermediate: ["*1/*4", "*1/*5", "*2/*4"]
      extensive: ["*1/*1", "*2/*2"]
      ultra_rapid: ["*1xN", "*2xN"]
  CYP2C19:
    drugs:
      - "氯吡格雷"
      - "奥美拉唑"
      - "兰索拉唑"
      - "艾司西酞普兰"
    metabolism_phenotypes:
      poor: ["*2/*2", "*3/*3", "*2/*3"]
      intermediate: ["*1/*2", "*1/*3", "*17/*2"]
      extensive: ["*1/*1"]
      ultra_rapid: ["*17/*17"]
  CYP2C9:
    drugs:
      - "华法林"
      - "苯妥英"
      - "甲苯磺丁脲"
      - "塞来昔布"
    metabolism_phenotypes:
      poor: ["*2/*2", "*3/*3", "*2/*3"]
      intermediate: ["*1/*2", "*1/*3"]
      extensive: ["*1/*1"]
  TPMT:
    drugs:
      - "硫唑嘌呤"
      - "6-巯基嘌呤"
      - "氟达拉滨"
    metabolism_phenotypes:
      poor: ["*2/*2", "*3/*3", "*2/*3"]
      intermediate: ["*1/*2", "*1/*3"]
      extensive: ["*1/*1"]
  DPYD:
    drugs:
      - "氟尿嘧啶"
      - "卡培他滨"
      - "替加氟"
    metabolism_phenotypes:
      poor: ["*2/*2", "*3A/*3A", "*2/*3A"]
      intermediate: ["*1/*2", "*1/*3A"]
      extensive: ["*1/*1"]
  VKORC1:
    drugs:
      - "华法林"
    metabolism_phenotypes:
      poor: ["-1639G/A", "-1639A/A"]
      intermediate: ["-1639C/G"]
      extensive: ["-1639C/C"]
  UGT1A1:
    drugs:
      - "伊立替康"
      - "阿奇霉素"
    metabolism_phenotypes:
      poor: ["*28/*28", "*6/*6"]
      intermediate: ["*1/*28", "*1/*6"]
      extensive: ["*1/*1"]

