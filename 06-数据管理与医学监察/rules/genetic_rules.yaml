# ── 罕见变异标记规则 ────────────────────────────────────────
rare_variant_rules:
  # 罕见变异频率阈值
  frequency_threshold: 0.01
  # 需要标记为 INFO 严重级别
  severity: "INFO"
  # 需要额外验证的变异
  requires_validation: true
